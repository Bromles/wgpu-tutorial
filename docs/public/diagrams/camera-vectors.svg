<svg viewBox="0 0 600 480" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <rect width="600" height="480" fill="#fff" rx="8"/>

  <defs>
    <marker id="arrFwd" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
    <marker id="arrZ" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
    <marker id="arrX" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" fill="#1e293b" font-size="15" font-weight="bold">Камера: векторы forward и right (вид сверху)</text>

  <!-- Grid cross at camera center -->
  <!-- Camera center at (280, 260) -->
  <!-- In top-down view: screen +X = world +X (right), screen +Y = world -Z (forward default = up on screen) -->

  <!-- Subtle grid lines -->
  <line x1="280" y1="60" x2="280" y2="440" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="60" y1="260" x2="500" y2="260" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- World axes labels -->
  <!-- +X axis (right on screen) -->
  <line x1="280" y1="260" x2="490" y2="260" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrX)"/>
  <text x="492" y="264" fill="#6b7280" font-size="12" font-weight="bold">+X</text>

  <!-- -Z axis (up on screen = default forward) -->
  <line x1="280" y1="260" x2="280" y2="65" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#arrZ)"/>
  <text x="260" y="58" fill="#6b7280" font-size="12" font-weight="bold">−Z</text>

  <!-- -Z label as "initial direction" -->
  <text x="290" y="90" fill="#6b7280" font-size="10">−Z (начальное направление)</text>

  <!-- Yaw angle arc (from -Z axis toward forward vector) -->
  <!-- -Z is straight up (angle 0°). yaw rotates clockwise in top-down. -->
  <!-- Forward vector at yaw=35°: screen angle = 270° + 35° = 305° from +X screen axis, -->
  <!-- but simpler: from center, -Z is up (270°), yaw=35° means rotate CW by 35° on screen. -->
  <!-- Arc from -Z direction to forward direction -->
  <!-- -Z direction unit from center: (0, -1) => point at (280, 260-70) = (280, 190) -->
  <!-- Forward at yaw=35°: (-sin(35°), -cos(35°)) ≈ (-0.574, -0.819) => screen: (-0.574*70, -0.819*70) = (-40.2, -57.3) => (239.8, 202.7) -->

  <path d="M 280,190 A 70,70 0 0 1 239.8,202.7" fill="none" stroke="#16a34a" stroke-width="2.5"/>
  <text x="248" y="185" fill="#16a34a" font-size="13" font-weight="bold">yaw</text>

  <!-- Forward vector (yaw = 35°): -->
  <!-- forward = (-sin(35°), 0, -cos(35°)) -->
  <!-- In screen coords (top-down, +X right, -Z up): -->
  <!-- dx = -sin(35°)*160 ≈ -91.8, dy = -cos(35°)*160 ≈ -131.1 -->
  <!-- end point: (280 - 91.8, 260 - 131.1) = (188.2, 128.9) -->
  <line x1="280" y1="260" x2="188" y2="129" stroke="#2563eb" stroke-width="3" marker-end="url(#arrFwd)"/>
  <text x="160" y="125" fill="#2563eb" font-size="13" font-weight="bold">Вперёд (forward)</text>

  <!-- Right vector: perpendicular to forward, 90° CW in top-down -->
  <!-- right = (cos(35°), 0, -sin(35°)) -->
  <!-- In screen: dx = cos(35°)*110 ≈ 90.1, dy = -sin(35°)*110... -->
  <!-- Wait: right = (cos(yaw), 0, -sin(yaw)) -->
  <!-- In top-down screen: screen_dx = cos(yaw), screen_dy = sin(yaw) (because -Z maps to -screenY, so -sin(yaw) in world Z => +screen_y direction... -->
  <!-- Actually let me think again. -->
  <!-- World: X right, Z toward viewer (out of screen in top-down). -->
  <!-- Top-down screen: +X right, -Z up. -->
  <!-- forward_world = (-sin(yaw), -cos(yaw)) in (X,Z) -->
  <!-- forward_screen = (-sin(yaw), cos(yaw)) in (screen_x, screen_y) since -Z maps to -screen_y -->
  <!-- Wait no: screen_y = -world_z (since -Z is up on screen means smaller y). -->
  <!-- Hmm, let me just be concrete. -->
  <!-- screen: +X right, -Z up (decreasing screen y). -->
  <!-- So screen_dx = world_x, screen_dy = -world_z (positive world_z = toward viewer = down on screen). -->
  <!-- Wait, if -Z is up on screen (I drew -Z going up with decreasing y), then world_z = -screen_y, so screen_dy = -world_z. -->
  <!-- Hmm that's not right either. Let me just use: -->
  <!-- screen_x = world_x -->
  <!-- screen_y = -(-world_z) = world_z... no. -->
  <!-- I set up: -Z axis goes UP on screen (from center to y=60). -->
  <!-- A point at world (0, 0, -1) should map to screen (0, -1) relative. -->
  <!-- So screen_x = world_x, screen_y = world_z. -->
  <!-- Because world (0,0,-1) => screen (0, -1) ✓ (up) -->
  <!-- And world (1,0,0) => screen (1, 0) ✓ (right) -->
  <!-- So screen_y = world_z... but that means world Z+ is DOWN on screen. -->
  <!-- Hmm but that means world +Z is down. And -Z is up. That makes sense for top-down view. -->

  <!-- forward = (-sin(yaw), -cos(yaw)) in (X, Z) -->
  <!-- forward_screen = (-sin(yaw), -cos(yaw)) in (sx, sy) since sy = world_z -->
  <!-- For yaw=35°: forward_screen = (-0.574, -0.819), pointing left and up. That matches what I drew. Good. -->

  <!-- right = (cos(yaw), -sin(yaw)) in (X, Z) -->
  <!-- right_screen = (cos(yaw), -sin(yaw)) in (sx, sy) -->
  <!-- For yaw=35°: right_screen = (0.819, -0.574), pointing right and up. -->

  <!-- Right vector length 110: dx = 0.819*110 = 90.1, dy = -0.574*110 = -63.1 -->
  <!-- end: (280 + 90, 260 - 63) = (370, 197) -->
  <line x1="280" y1="260" x2="370" y2="197" stroke="#dc2626" stroke-width="3" marker-end="url(#arrRight)"/>
  <text x="375" y="195" fill="#dc2626" font-size="13" font-weight="bold">Вправо (right)</text>

  <!-- Camera position dot -->
  <circle cx="280" cy="260" r="6" fill="#1e293b"/>
  <text x="280" y="285" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Камера</text>

  <!-- Right angle indicator between forward and right -->
  <!-- At the tip of a short forward vector -->
  <!-- Point on forward at distance 30: (280 + (-0.574)*30, 260 + (-0.819)*30) = (262.8, 235.4) -->
  <!-- From there, add right direction scaled by 30: (262.8 + 0.819*25, 235.4 + (-0.574)*25) = (283.3, 221.1) -->
  <!-- Point on right at distance 25: (280 + 0.819*30, 260 + (-0.574)*30) = (304.6, 242.8) -->
  <!-- The corner of the right-angle square -->
  <!-- Actually: take a small square. -->
  <!-- p1 = center + forward_unit * 25 = (280 - 14.35, 260 - 20.47) = (265.6, 239.5) -->
  <!-- p2 = p1 + right_unit * 25 = (265.6 + 20.47, 239.5 - 14.35) = (286.1, 225.2) -->
  <!-- p3 = center + right_unit * 25 = (280 + 20.47, 260 - 14.35) = (300.5, 245.7) -->
  <polyline points="265.6,239.5 286.1,225.2 300.5,245.7" fill="none" stroke="#475569" stroke-width="1.5"/>

  <!-- Formulas box -->
  <rect x="30" y="350" width="540" height="110" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="6"/>

  <text x="300" y="375" text-anchor="middle" fill="#1e293b" font-size="13" font-weight="bold">Формулы (в плоскости XZ):</text>

  <text x="50" y="400" fill="#2563eb" font-size="13" font-weight="bold">forward</text>
  <text x="120" y="400" fill="#334155" font-size="13">= ( −sin(yaw),  0,  −cos(yaw) )</text>

  <text x="50" y="422" fill="#dc2626" font-size="13" font-weight="bold">right</text>
  <text x="100" y="422" fill="#334155" font-size="13">  = (  cos(yaw),  0,  −sin(yaw) )</text>

  <text x="50" y="448" fill="#64748b" font-size="11">При yaw = 0: forward = (0, 0, −1) — смотрит вдоль −Z</text>
  <text x="50" y="462" fill="#64748b" font-size="11">right всегда перпендикулярен forward, повёрнут на 90° по часовой</text>
</svg>
