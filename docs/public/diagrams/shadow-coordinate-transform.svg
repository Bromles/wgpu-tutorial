<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="100%" style="font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;">
  <rect width="600" height="380" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="300" y="28" text-anchor="middle" fill="#ccc" font-size="14" font-weight="600">Координатный трансформ для shadow mapping</text>

  <!-- Step 1: Clip space -->
  <g transform="translate(30, 60)">
    <rect x="0" y="0" width="150" height="120" rx="4" fill="#1e1e30" stroke="#555" stroke-width="1"/>
    <text x="75" y="20" text-anchor="middle" fill="#ddd" font-size="11" font-weight="600">Light clip space</text>
    
    <!-- Axes -->
    <line x1="75" y1="90" x2="135" y2="90" stroke="#dd5555" stroke-width="1.5"/>
    <text x="138" y="94" fill="#dd5555" font-size="9">x</text>
    <line x1="75" y1="90" x2="75" y2="35" stroke="#55aa55" stroke-width="1.5"/>
    <text x="79" y="33" fill="#55aa55" font-size="9">y</text>
    
    <!-- Range labels -->
    <text x="35" y="90" text-anchor="middle" fill="#888" font-size="9">-1</text>
    <text x="135" y="90" text-anchor="middle" fill="#888" font-size="9">1</text>
    <text x="75" y="35" text-anchor="middle" fill="#888" font-size="9">1</text>
    <text x="75" y="110" text-anchor="middle" fill="#888" font-size="9">-1</text>
    
    <!-- Z note -->
    <text x="75" y="130" text-anchor="middle" fill="#888" font-size="9">z ∈ [0, 1]</text>
  </g>

  <!-- Arrow 1 -->
  <line x1="190" y1="120" x2="220" y2="120" stroke="#888" stroke-width="1" marker-end="url(#arr1)"/>
  <defs><marker id="arr1" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#888"/></marker></defs>
  <text x="205" y="110" text-anchor="middle" fill="#aaa" font-size="9">×0.5+0.5</text>

  <!-- Step 2: UV space -->
  <g transform="translate(230, 60)">
    <rect x="0" y="0" width="150" height="120" rx="4" fill="#1e1e30" stroke="#555" stroke-width="1"/>
    <text x="75" y="20" text-anchor="middle" fill="#ddd" font-size="11" font-weight="600">UV space</text>
    
    <!-- Axes -->
    <line x1="15" y1="90" x2="135" y2="90" stroke="#dd5555" stroke-width="1.5"/>
    <text x="138" y="94" fill="#dd5555" font-size="9">u</text>
    <line x1="15" y1="90" x2="15" y2="35" stroke="#55aa55" stroke-width="1.5"/>
    <text x="10" y="33" fill="#55aa55" font-size="9">v</text>
    
    <!-- Range labels -->
    <text x="15" y="105" text-anchor="middle" fill="#888" font-size="9">0</text>
    <text x="135" y="105" text-anchor="middle" fill="#888" font-size="9">1</text>
    <text x="15" y="35" text-anchor="middle" fill="#888" font-size="9">1</text>
    
    <!-- Y inversion highlight -->
    <rect x="2" y="30" width="146" height="85" rx="2" fill="none" stroke="#dd6644" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="75" y="130" text-anchor="middle" fill="#dd6644" font-size="9">y инвертирован: 1-(y*0.5+0.5)</text>
  </g>

  <!-- Arrow 2 -->
  <line x1="390" y1="120" x2="420" y2="120" stroke="#888" stroke-width="1" marker-end="url(#arr1)"/>
  <text x="405" y="110" text-anchor="middle" fill="#aaa" font-size="9">sample</text>

  <!-- Step 3: Shadow map -->
  <g transform="translate(430, 60)">
    <rect x="0" y="0" width="140" height="120" rx="4" fill="#1e1e30" stroke="#555" stroke-width="1"/>
    <text x="70" y="20" text-anchor="middle" fill="#ddd" font-size="11" font-weight="600">Shadow map</text>
    
    <!-- Grid cells -->
    <rect x="10" y="30" width="20" height="20" fill="#223344" stroke="#334" stroke-width="0.5"/>
    <rect x="30" y="30" width="20" height="20" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="50" y="30" width="20" height="20" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="70" y="30" width="20" height="20" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="90" y="30" width="20" height="20" fill="#335577" stroke="#334" stroke-width="0.5"/>
    <rect x="110" y="30" width="20" height="20" fill="#223344" stroke="#334" stroke-width="0.5"/>
    
    <rect x="10" y="50" width="20" height="20" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="30" y="50" width="20" height="20" fill="#668899" stroke="#334" stroke-width="0.5"/>
    <rect x="50" y="50" width="20" height="20" fill="#7799aa" stroke="#334" stroke-width="0.5"/>
    <rect x="70" y="50" width="20" height="20" fill="#668899" stroke="#334" stroke-width="0.5"/>
    <rect x="90" y="50" width="20" height="20" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="110" y="50" width="20" height="20" fill="#446688" stroke="#334" stroke-width="0.5"/>
    
    <rect x="10" y="70" width="20" height="20" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="30" y="70" width="20" height="20" fill="#7799aa" stroke="#334" stroke-width="0.5"/>
    <rect x="50" y="70" width="20" height="20" fill="#88aabb" stroke="#334" stroke-width="0.5"/>
    <rect x="70" y="70" width="20" height="20" fill="#7799aa" stroke="#334" stroke-width="0.5"/>
    <rect x="90" y="70" width="20" height="20" fill="#668899" stroke="#334" stroke-width="0.5"/>
    <rect x="110" y="70" width="20" height="20" fill="#557799" stroke="#334" stroke-width="0.5"/>
    
    <rect x="10" y="90" width="20" height="20" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="30" y="90" width="20" height="20" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="50" y="90" width="20" height="20" fill="#668899" stroke="#334" stroke-width="0.5"/>
    <rect x="70" y="90" width="20" height="20" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="90" y="90" width="20" height="20" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="110" y="90" width="20" height="20" fill="#335577" stroke="#334" stroke-width="0.5"/>
    
    <text x="70" y="125" text-anchor="middle" fill="#888" font-size="9">depth значения [0, 1]</text>
  </g>

  <!-- Depth bias section -->
  <g transform="translate(30, 230)">
    <text x="270" y="0" text-anchor="middle" fill="#ccc" font-size="13" font-weight="600">Depth bias: почему нужен</text>
    
    <!-- Shadow acne -->
    <rect x="0" y="15" width="250" height="100" rx="4" fill="#1e1e30" stroke="#dd5555" stroke-width="1"/>
    <text x="125" y="35" text-anchor="middle" fill="#dd5555" font-size="11" font-weight="600">Без bias: shadow acne</text>
    
    <!-- Surface with stripes -->
    <rect x="20" y="50" width="210" height="10" fill="#444" rx="1"/>
    <rect x="30" y="55" width="15" height="5" fill="#222"/>
    <rect x="60" y="55" width="15" height="5" fill="#222"/>
    <rect x="90" y="55" width="15" height="5" fill="#222"/>
    <rect x="120" y="55" width="15" height="5" fill="#222"/>
    <rect x="150" y="55" width="15" height="5" fill="#222"/>
    <rect x="180" y="55" width="15" height="5" fill="#222"/>
    <text x="125" y="80" text-anchor="middle" fill="#888" font-size="10">Полосы: поверхность самозатеняется</text>
    <text x="125" y="95" text-anchor="middle" fill="#666" font-size="9">из-за погрешности depth сравнения</text>
  </g>

  <g transform="translate(320, 230)">
    <!-- With bias -->
    <rect x="0" y="15" width="250" height="100" rx="4" fill="#1e1e30" stroke="#44aa66" stroke-width="1"/>
    <text x="125" y="35" text-anchor="middle" fill="#44aa66" font-size="11" font-weight="600">С bias: чистая тень</text>
    
    <!-- Clean surface -->
    <rect x="20" y="50" width="210" height="10" fill="#444" rx="1"/>
    <rect x="160" y="55" width="70" height="5" fill="#222"/>
    <text x="125" y="80" text-anchor="middle" fill="#888" font-size="10">Bias сдвигает depth при записи</text>
    <text x="125" y="95" text-anchor="middle" fill="#666" font-size="9">поверхность не затеняет сама себя</text>
  </g>

  <!-- Warning about Peter Panning -->
  <text x="300" y="365" text-anchor="middle" fill="#dd6644" font-size="10">Слишком большой bias → Peter Panning: тень «отрывается» от объекта</text>
</svg>
