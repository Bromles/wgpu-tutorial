<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" width="100%" style="font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;">
  <rect width="700" height="420" fill="#1a1a2e" rx="8"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#888"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#5588cc"/>
    </marker>
    <marker id="arrow-orange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#dd8844"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" fill="#ccc" font-size="14" font-weight="600">Трансформация UV-координат для shadow mapping</text>

  <!-- ===== Top pipeline ===== -->

  <!-- Step 1: Light Clip Space -->
  <g transform="translate(20, 50)">
    <rect x="0" y="0" width="170" height="130" rx="4" fill="#1e1e30" stroke="#555" stroke-width="1"/>
    <text x="85" y="20" text-anchor="middle" fill="#ddd" font-size="12" font-weight="600">Light Clip Space</text>
    <text x="85" y="35" text-anchor="middle" fill="#888" font-size="9">(NDC)</text>

    <!-- Coordinate grid -->
    <line x1="85" y1="100" x2="155" y2="100" stroke="#dd5555" stroke-width="1.5"/>
    <text x="160" y="104" fill="#dd5555" font-size="9">x</text>
    <line x1="85" y1="100" x2="85" y2="45" stroke="#55aa55" stroke-width="1.5"/>
    <text x="90" y="43" fill="#55aa55" font-size="9">y</text>

    <!-- Origin dot -->
    <circle cx="85" cy="100" r="2" fill="#aaa"/>

    <!-- Range labels -->
    <text x="35" y="103" text-anchor="middle" fill="#888" font-size="9">-1</text>
    <text x="135" y="103" text-anchor="middle" fill="#888" font-size="9">1</text>
    <text x="85" y="46" text-anchor="middle" fill="#888" font-size="9">1</text>
    <text x="85" y="118" text-anchor="middle" fill="#888" font-size="9">-1</text>

    <!-- Sample point -->
    <circle cx="110" cy="75" r="3" fill="#dd8844" opacity="0.9"/>
    <text x="120" y="72" fill="#dd8844" font-size="8">(0.3, 0.5)</text>

    <text x="85" y="140" text-anchor="middle" fill="#666" font-size="9">coords ∈ [-1, 1]</text>
  </g>

  <!-- Arrow 1 -->
  <g transform="translate(200, 115)">
    <line x1="0" y1="0" x2="35" y2="0" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="17" y="-8" text-anchor="middle" fill="#aaa" font-size="9" font-weight="600">×0.5 + 0.5</text>
  </g>

  <!-- Step 2: UV Space -->
  <g transform="translate(245, 50)">
    <rect x="0" y="0" width="170" height="130" rx="4" fill="#1e1e30" stroke="#555" stroke-width="1"/>
    <text x="85" y="20" text-anchor="middle" fill="#ddd" font-size="12" font-weight="600">UV Space</text>

    <!-- Coordinate grid -->
    <line x1="20" y1="100" x2="155" y2="100" stroke="#dd5555" stroke-width="1.5"/>
    <text x="160" y="104" fill="#dd5555" font-size="9">u</text>
    <line x1="20" y1="100" x2="20" y2="45" stroke="#55aa55" stroke-width="1.5"/>
    <text x="14" y="43" fill="#55aa55" font-size="9">v</text>

    <!-- Origin dot -->
    <circle cx="20" cy="100" r="2" fill="#aaa"/>

    <!-- Range labels -->
    <text x="20" y="115" text-anchor="middle" fill="#888" font-size="9">0</text>
    <text x="155" y="115" text-anchor="middle" fill="#888" font-size="9">1</text>
    <text x="20" y="44" text-anchor="middle" fill="#888" font-size="9">1</text>

    <!-- Mapped point -->
    <circle cx="68" cy="62" r="3" fill="#dd8844" opacity="0.9"/>
    <text x="80" y="59" fill="#dd8844" font-size="8">(0.65, 0.75)</text>

    <!-- Y-inversion note -->
    <rect x="3" y="38" width="164" height="72" rx="2" fill="none" stroke="#dd6644" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="85" y="140" text-anchor="middle" fill="#dd6644" font-size="9">y инвертирован: 1−(y×0.5+0.5)</text>
  </g>

  <!-- Arrow 2 -->
  <g transform="translate(425, 115)">
    <line x1="0" y1="0" x2="35" y2="0" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
    <text x="17" y="-8" text-anchor="middle" fill="#aaa" font-size="8">sample</text>
  </g>

  <!-- Step 3: Shadow map lookup -->
  <g transform="translate(470, 50)">
    <rect x="0" y="0" width="210" height="130" rx="4" fill="#1e1e30" stroke="#555" stroke-width="1"/>
    <text x="105" y="20" text-anchor="middle" fill="#ddd" font-size="12" font-weight="600">Shadow Map</text>

    <!-- Grid cells -->
    <rect x="15" y="32" width="22" height="18" fill="#223344" stroke="#334" stroke-width="0.5"/>
    <rect x="37" y="32" width="22" height="18" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="59" y="32" width="22" height="18" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="81" y="32" width="22" height="18" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="103" y="32" width="22" height="18" fill="#335577" stroke="#334" stroke-width="0.5"/>
    <rect x="125" y="32" width="22" height="18" fill="#223344" stroke="#334" stroke-width="0.5"/>
    <rect x="147" y="32" width="22" height="18" fill="#1a2a3a" stroke="#334" stroke-width="0.5"/>

    <rect x="15" y="50" width="22" height="18" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="37" y="50" width="22" height="18" fill="#668899" stroke="#334" stroke-width="0.5"/>
    <rect x="59" y="50" width="22" height="18" fill="#7799aa" stroke="#334" stroke-width="0.5"/>
    <rect x="81" y="50" width="22" height="18" fill="#668899" stroke="#334" stroke-width="0.5"/>
    <rect x="103" y="50" width="22" height="18" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="125" y="50" width="22" height="18" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="147" y="50" width="22" height="18" fill="#335577" stroke="#334" stroke-width="0.5"/>

    <rect x="15" y="68" width="22" height="18" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="37" y="68" width="22" height="18" fill="#7799aa" stroke="#334" stroke-width="0.5"/>
    <!-- Sampled cell highlighted -->
    <rect x="59" y="68" width="22" height="18" fill="#dd8844" stroke="#dd8844" stroke-width="1.5"/>
    <rect x="81" y="68" width="22" height="18" fill="#7799aa" stroke="#334" stroke-width="0.5"/>
    <rect x="103" y="68" width="22" height="18" fill="#668899" stroke="#334" stroke-width="0.5"/>
    <rect x="125" y="68" width="22" height="18" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="147" y="68" width="22" height="18" fill="#446688" stroke="#334" stroke-width="0.5"/>

    <rect x="15" y="86" width="22" height="18" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="37" y="86" width="22" height="18" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="59" y="86" width="22" height="18" fill="#668899" stroke="#334" stroke-width="0.5"/>
    <rect x="81" y="86" width="22" height="18" fill="#557799" stroke="#334" stroke-width="0.5"/>
    <rect x="103" y="86" width="22" height="18" fill="#446688" stroke="#334" stroke-width="0.5"/>
    <rect x="125" y="86" width="22" height="18" fill="#335577" stroke="#334" stroke-width="0.5"/>
    <rect x="147" y="86" width="22" height="18" fill="#223344" stroke="#334" stroke-width="0.5"/>

    <!-- Sampled depth value -->
    <text x="105" y="120" text-anchor="middle" fill="#dd8844" font-size="10" font-weight="600">depth = 0.42</text>
    <text x="105" y="132" text-anchor="middle" fill="#666" font-size="9">textureSample(shadow_map, sampler, uv)</text>
  </g>

  <!-- ===== Bottom section: Depth comparison ===== -->

  <text x="350" y="218" text-anchor="middle" fill="#ccc" font-size="13" font-weight="600">Сравнение глубин</text>

  <!-- Fragment depth box -->
  <g transform="translate(30, 235)">
    <rect x="0" y="0" width="200" height="80" rx="4" fill="#1e1e30" stroke="#5588cc" stroke-width="1"/>
    <text x="100" y="20" text-anchor="middle" fill="#5588cc" font-size="11" font-weight="600">Глубина фрагмента</text>

    <!-- Depth bar -->
    <rect x="15" y="35" width="170" height="12" rx="2" fill="#222"/>
    <rect x="15" y="35" width="95" height="12" rx="2" fill="#5588cc" opacity="0.6"/>
    <text x="100" y="65" text-anchor="middle" fill="#5588cc" font-size="12" font-weight="600">0.56</text>
    <text x="15" y="72" fill="#555" font-size="8">0.0</text>
    <text x="175" y="72" text-anchor="middle" fill="#555" font-size="8">1.0</text>
  </g>

  <!-- VS label -->
  <text x="260" y="280" text-anchor="middle" fill="#888" font-size="16" font-weight="700">vs</text>

  <!-- Shadow map depth box -->
  <g transform="translate(290, 235)">
    <rect x="0" y="0" width="200" height="80" rx="4" fill="#1e1e30" stroke="#dd8844" stroke-width="1"/>
    <text x="100" y="20" text-anchor="middle" fill="#dd8844" font-size="11" font-weight="600">Глубина shadow map</text>

    <!-- Depth bar -->
    <rect x="15" y="35" width="170" height="12" rx="2" fill="#222"/>
    <rect x="15" y="35" width="71" height="12" rx="2" fill="#dd8844" opacity="0.6"/>
    <text x="100" y="65" text-anchor="middle" fill="#dd8844" font-size="12" font-weight="600">0.42</text>
    <text x="15" y="72" fill="#555" font-size="8">0.0</text>
    <text x="175" y="72" text-anchor="middle" fill="#555" font-size="8">1.0</text>
  </g>

  <!-- Arrow to result -->
  <line x1="505" y1="275" x2="545" y2="275" stroke="#888" stroke-width="1" marker-end="url(#arrow)"/>
  <text x="525" y="265" text-anchor="middle" fill="#888" font-size="8">0.56 &gt; 0.42</text>

  <!-- Result: In shadow (example shown) -->
  <g transform="translate(555, 240)">
    <rect x="0" y="0" width="120" height="70" rx="4" fill="#1e1e30" stroke="#6688bb" stroke-width="1.5"/>
    <text x="60" y="22" text-anchor="middle" fill="#6688bb" font-size="11" font-weight="600">fragment &gt; shadow</text>

    <!-- In shadow result -->
    <rect x="10" y="32" width="100" height="28" rx="3" fill="#223355" stroke="#4477aa" stroke-width="1"/>
    <text x="60" y="51" text-anchor="middle" fill="#6699cc" font-size="13" font-weight="700">В тени</text>
  </g>

  <!-- Bottom: Two outcome cases -->
  <g transform="translate(50, 340)">
    <!-- In shadow case -->
    <rect x="0" y="0" width="280" height="60" rx="4" fill="#1e1e30" stroke="#4477aa" stroke-width="1"/>
    <rect x="10" y="8" width="12" height="12" rx="6" fill="#4477aa"/>
    <text x="30" y="18" fill="#6699cc" font-size="11" font-weight="600">В тени (shadow = 1.0)</text>
    <text x="15" y="38" fill="#888" font-size="10">fragment_depth &gt; shadow_map_depth</text>
    <text x="15" y="52" fill="#666" font-size="9">Объект перекрыт — свет не достигает</text>
  </g>

  <g transform="translate(370, 340)">
    <!-- Lit case -->
    <rect x="0" y="0" width="280" height="60" rx="4" fill="#1e1e30" stroke="#dd8844" stroke-width="1"/>
    <rect x="10" y="8" width="12" height="12" rx="6" fill="#dd8844"/>
    <text x="30" y="18" fill="#ddaa66" font-size="11" font-weight="600">Освещено (shadow = 0.0)</text>
    <text x="15" y="38" fill="#888" font-size="10">fragment_depth ≤ shadow_map_depth</text>
    <text x="15" y="52" fill="#666" font-size="9">Ближайшая к свету поверхность</text>
  </g>

  <!-- WGSL code hint -->
  <text x="350" y="415" text-anchor="middle" fill="#555" font-size="9">let shadow = select(0.0, 1.0, fragment_depth > shadow_depth);</text>
</svg>