<svg viewBox="0 0 440 220" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <rect width="440" height="220" fill="#fff" rx="8"/>

  <!-- Pixel grid -->
  <g stroke="#ccc" stroke-width="0.5" fill="#fff">
    <rect x="40" y="30" width="40" height="40"/>
    <rect x="80" y="30" width="40" height="40"/>
    <rect x="120" y="30" width="40" height="40"/>
    <rect x="160" y="30" width="40" height="40"/>
    <rect x="40" y="70" width="40" height="40"/>
    <rect x="80" y="70" width="40" height="40"/>
    <rect x="120" y="70" width="40" height="40"/>
    <rect x="160" y="70" width="40" height="40"/>
    <rect x="40" y="110" width="40" height="40"/>
    <rect x="80" y="110" width="40" height="40"/>
    <rect x="120" y="110" width="40" height="40"/>
    <rect x="160" y="110" width="40" height="40"/>
    <rect x="40" y="150" width="40" height="40"/>
    <rect x="80" y="150" width="40" height="40"/>
    <rect x="120" y="150" width="40" height="40"/>
    <rect x="160" y="150" width="40" height="40"/>
  </g>

  <!-- Triangle edge: y = -0.625x + 155 -->
  <line x1="40" y1="130" x2="200" y2="30" stroke="#dc2626" stroke-width="2.5"/>

  <!-- GRAY dots (outside) -->
  <!-- Pixel (40,30): all 4 out -->
  <circle cx="50" cy="40" r="2.5" fill="#d4d4d4"/>
  <circle cx="70" cy="40" r="2.5" fill="#d4d4d4"/>
  <circle cx="50" cy="60" r="2.5" fill="#d4d4d4"/>
  <circle cx="70" cy="60" r="2.5" fill="#d4d4d4"/>
  <!-- Pixel (80,30): all 4 out -->
  <circle cx="90" cy="40" r="2.5" fill="#d4d4d4"/>
  <circle cx="110" cy="40" r="2.5" fill="#d4d4d4"/>
  <circle cx="90" cy="60" r="2.5" fill="#d4d4d4"/>
  <circle cx="110" cy="60" r="2.5" fill="#d4d4d4"/>
  <!-- Pixel (120,30): all 4 out -->
  <circle cx="130" cy="40" r="2.5" fill="#d4d4d4"/>
  <circle cx="150" cy="40" r="2.5" fill="#d4d4d4"/>
  <circle cx="130" cy="60" r="2.5" fill="#d4d4d4"/>
  <circle cx="150" cy="60" r="2.5" fill="#d4d4d4"/>
  <!-- Pixel (160,30): 1 out -->
  <circle cx="170" cy="40" r="2.5" fill="#d4d4d4"/>
  <!-- Pixel (40,70): all 4 out -->
  <circle cx="50" cy="80" r="2.5" fill="#d4d4d4"/>
  <circle cx="70" cy="80" r="2.5" fill="#d4d4d4"/>
  <circle cx="50" cy="100" r="2.5" fill="#d4d4d4"/>
  <circle cx="70" cy="100" r="2.5" fill="#d4d4d4"/>
  <!-- Pixel (80,70): 2 out -->
  <circle cx="90" cy="80" r="2.5" fill="#d4d4d4"/>
  <circle cx="110" cy="80" r="2.5" fill="#d4d4d4"/>
  <!-- Pixel (40,110): 1 out -->
  <circle cx="50" cy="120" r="2.5" fill="#d4d4d4"/>

  <!-- BLUE dots (inside) -->
  <!-- Pixel (160,30): 3 in -->
  <circle cx="190" cy="40" r="2.5" fill="#3b82f6"/>
  <circle cx="170" cy="60" r="2.5" fill="#3b82f6"/>
  <circle cx="190" cy="60" r="2.5" fill="#3b82f6"/>
  <!-- Pixel (80,70): 2 in -->
  <circle cx="90" cy="100" r="2.5" fill="#3b82f6"/>
  <circle cx="110" cy="100" r="2.5" fill="#3b82f6"/>
  <!-- Pixel (120,70): all 4 in -->
  <circle cx="130" cy="80" r="2.5" fill="#3b82f6"/>
  <circle cx="150" cy="80" r="2.5" fill="#3b82f6"/>
  <circle cx="130" cy="100" r="2.5" fill="#3b82f6"/>
  <circle cx="150" cy="100" r="2.5" fill="#3b82f6"/>
  <!-- Pixel (160,70): all 4 in -->
  <circle cx="170" cy="80" r="2.5" fill="#3b82f6"/>
  <circle cx="190" cy="80" r="2.5" fill="#3b82f6"/>
  <circle cx="170" cy="100" r="2.5" fill="#3b82f6"/>
  <circle cx="190" cy="100" r="2.5" fill="#3b82f6"/>
  <!-- Pixel (40,110): 3 in -->
  <circle cx="70" cy="120" r="2.5" fill="#3b82f6"/>
  <circle cx="50" cy="140" r="2.5" fill="#3b82f6"/>
  <circle cx="70" cy="140" r="2.5" fill="#3b82f6"/>
  <!-- Pixel (80,110): all 4 in -->
  <circle cx="90" cy="120" r="2.5" fill="#3b82f6"/>
  <circle cx="110" cy="120" r="2.5" fill="#3b82f6"/>
  <circle cx="90" cy="140" r="2.5" fill="#3b82f6"/>
  <circle cx="110" cy="140" r="2.5" fill="#3b82f6"/>
  <!-- Pixel (120,110): all 4 in -->
  <circle cx="130" cy="120" r="2.5" fill="#3b82f6"/>
  <circle cx="150" cy="120" r="2.5" fill="#3b82f6"/>
  <circle cx="130" cy="140" r="2.5" fill="#3b82f6"/>
  <circle cx="150" cy="140" r="2.5" fill="#3b82f6"/>
  <!-- Pixel (160,110): all 4 in -->
  <circle cx="170" cy="120" r="2.5" fill="#3b82f6"/>
  <circle cx="190" cy="120" r="2.5" fill="#3b82f6"/>
  <circle cx="170" cy="140" r="2.5" fill="#3b82f6"/>
  <circle cx="190" cy="140" r="2.5" fill="#3b82f6"/>
  <!-- Row 3: all 16 in -->
  <circle cx="50" cy="160" r="2.5" fill="#3b82f6"/>
  <circle cx="70" cy="160" r="2.5" fill="#3b82f6"/>
  <circle cx="50" cy="180" r="2.5" fill="#3b82f6"/>
  <circle cx="70" cy="180" r="2.5" fill="#3b82f6"/>
  <circle cx="90" cy="160" r="2.5" fill="#3b82f6"/>
  <circle cx="110" cy="160" r="2.5" fill="#3b82f6"/>
  <circle cx="90" cy="180" r="2.5" fill="#3b82f6"/>
  <circle cx="110" cy="180" r="2.5" fill="#3b82f6"/>
  <circle cx="130" cy="160" r="2.5" fill="#3b82f6"/>
  <circle cx="150" cy="160" r="2.5" fill="#3b82f6"/>
  <circle cx="130" cy="180" r="2.5" fill="#3b82f6"/>
  <circle cx="150" cy="180" r="2.5" fill="#3b82f6"/>
  <circle cx="170" cy="160" r="2.5" fill="#3b82f6"/>
  <circle cx="190" cy="160" r="2.5" fill="#3b82f6"/>
  <circle cx="170" cy="180" r="2.5" fill="#3b82f6"/>
  <circle cx="190" cy="180" r="2.5" fill="#3b82f6"/>

  <!-- Highlight the 2/2 pixel -->
  <rect x="80" y="70" width="40" height="40" fill="#fbbf24" fill-opacity="0.25" stroke="#dc2626" stroke-width="1.5"/>

  <!-- Legend -->
  <text x="240" y="50" fill="#3b82f6" font-size="11">● внутри треугольника</text>
  <text x="240" y="68" fill="#d4d4d4" font-size="11">● снаружи</text>
  <text x="240" y="100" fill="#dc2626" font-size="11">— грань треугольника</text>

  <!-- Explanation -->
  <text x="240" y="130" fill="#333" font-size="11" font-weight="bold">жёлтая клетка (2 из 4):</text>
  <text x="240" y="146" fill="#555" font-size="10">2 верхних сэмпла — снаружи</text>
  <text x="240" y="160" fill="#555" font-size="10">2 нижних — внутри</text>
  <text x="240" y="178" fill="#555" font-size="10">→ resolve: 50% цвет + 50% фон</text>
</svg>
