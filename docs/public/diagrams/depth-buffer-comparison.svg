<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="100%" style="font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;">
  <rect width="600" height="320" fill="#1a1a2e" rx="8"/>

  <text x="300" y="28" text-anchor="middle" fill="#ccc" font-size="14" font-weight="600">Depth buffer: без и с тестом глубины</text>

  <!-- Without depth buffer -->
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="250" height="230" rx="6" fill="#1e1e30" stroke="#dd5555" stroke-width="1.5"/>
    <text x="125" y="22" text-anchor="middle" fill="#dd5555" font-size="12" font-weight="600">Без depth buffer</text>

    <!-- Cube A (should be behind) drawn second -->
    <rect x="60" y="50" width="120" height="80" rx="0" fill="#5588aa" opacity="0.9"/>
    <text x="120" y="95" text-anchor="middle" fill="#fff" font-size="11">Cube A</text>
    <text x="120" y="108" text-anchor="middle" fill="#ddd" font-size="9">(дальний)</text>

    <!-- Cube B (should be in front) drawn first, now behind A -->
    <rect x="40" y="60" width="100" height="70" rx="0" fill="#aa5588" opacity="0.5"/>
    <text x="90" y="98" text-anchor="middle" fill="#fff" font-size="10">B?</text>

    <!-- Problem indicator -->
    <text x="125" y="155" text-anchor="middle" fill="#dd5555" font-size="10">Порядок отрисовки определяет</text>
    <text x="125" y="170" text-anchor="middle" fill="#dd5555" font-size="10">что поверх чего</text>

    <!-- Sequence -->
    <text x="125" y="195" text-anchor="middle" fill="#888" font-size="9">draw(A) → draw(B): B поверх A ✓</text>
    <text x="125" y="210" text-anchor="middle" fill="#dd6644" font-size="9">draw(B) → draw(A): A поверх B ✗</text>
  </g>

  <!-- With depth buffer -->
  <g transform="translate(320, 50)">
    <rect x="0" y="0" width="250" height="230" rx="6" fill="#1e1e30" stroke="#44aa66" stroke-width="1.5"/>
    <text x="125" y="22" text-anchor="middle" fill="#44aa66" font-size="12" font-weight="600">С depth buffer</text>

    <!-- Cube A behind -->
    <rect x="70" y="50" width="110" height="80" rx="0" fill="#5588aa" opacity="0.7"/>
    <text x="125" y="92" text-anchor="middle" fill="#ddd" font-size="11">Cube A (дальний)</text>

    <!-- Cube B in front, correctly overlapping -->
    <rect x="40" y="55" width="100" height="70" rx="0" fill="#aa5588" opacity="0.9"/>
    <text x="90" y="93" text-anchor="middle" fill="#fff" font-size="11">Cube B</text>
    <text x="90" y="106" text-anchor="middle" fill="#ddd" font-size="9">(ближний)</text>

    <!-- Correct indicator -->
    <text x="125" y="155" text-anchor="middle" fill="#44aa66" font-size="10">Порядок не важен —</text>
    <text x="125" y="170" text-anchor="middle" fill="#44aa66" font-size="10">ближний всегда поверх</text>

    <!-- Depth buffer visualization -->
    <text x="125" y="195" text-anchor="middle" fill="#888" font-size="9">depth buffer хранит глубину</text>
    <text x="125" y="210" text-anchor="middle" fill="#888" font-size="9">каждого пикселя</text>
  </g>

  <!-- Bottom note -->
  <text x="300" y="305" text-anchor="middle" fill="#888" font-size="10">depth_compare: Less → фрагмент рисуется только если его z меньше уже записанного</text>
</svg>
