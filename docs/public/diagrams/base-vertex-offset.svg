<svg viewBox="0 0 480 180" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif" font-size="12">
  <rect width="480" height="180" fill="#fff" rx="8"/>
  <g>
    <rect x="20" y="30" width="200" height="40" fill="#4a9eff" fill-opacity="0.15" stroke="#3070c0" stroke-width="1.5" rx="3"/>
    <text x="120" y="55" text-anchor="middle" fill="#222">Объект A (вершины 0–3)</text>
    <rect x="225" y="30" width="200" height="40" fill="#ff6b6b" fill-opacity="0.15" stroke="#c04040" stroke-width="1.5" rx="3"/>
