<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <rect width="400" height="300" fill="#fff" rx="8"/>

  <!-- Camera position -->
  <circle cx="60" cy="160" r="5" fill="#333"/>
  <text x="60" y="180" text-anchor="middle" fill="#333" font-size="10">eye</text>

  <!-- Direction vector -->
  <line x1="60" y1="160" x2="280" y2="120" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrBlue)"/>
  <text x="170" y="110" fill="#2563eb" font-size="13" font-weight="bold">direction</text>

  <!-- Yaw arc -->
  <path d="M 120,160 A 60,60 0 0 1 115,148" fill="none" stroke="#16a34a" stroke-width="2"/>
  <text x="125" y="155" fill="#16a34a" font-size="13" font-weight="bold">yaw</text>

  <!-- Pitch arc -->
  <path d="M 100,140 A 40,40 0 0 0 95,130" fill="none" stroke="#dc2626" stroke-width="2"/>
  <text x="78" y="128" fill="#dc2626" font-size="13" font-weight="bold">pitch</text>

  <!-- Forward (horizontal) -->
  <line x1="60" y1="160" x2="260" y2="160" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="230" y="175" fill="#16a34a" font-size="11">forward (XZ)</text>

  <!-- Right -->
  <line x1="60" y1="160" x2="60" y2="60" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="70" y="55" fill="#9333ea" font-size="11">up (Y)</text>

  <!-- Axes -->
  <text x="370" y="290" fill="#555" font-size="10">X →  Y ↑  Z ← (правая рука)</text>

  <!-- Formulas -->
  <text x="20" y="220" fill="#333" font-size="11">direction.x = -sin(yaw) × cos(pitch)</text>
  <text x="20" y="236" fill="#333" font-size="11">direction.y = sin(pitch)</text>
  <text x="20" y="252" fill="#333" font-size="11">direction.z = -cos(yaw) × cos(pitch)</text>

  <text x="20" y="280" fill="#555" font-size="10">yaw — поворот вокруг Y, pitch — наклон вверх/вниз</text>

  <defs>
    <marker id="arrBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>
</svg>
