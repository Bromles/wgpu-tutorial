<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 650 350" width="100%" style="font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;">
  <rect width="650" height="350" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="325" y="28" text-anchor="middle" fill="#ccc" font-size="14" font-weight="600">Умножение матрицы на вектор</text>

  <!-- Matrix -->
  <g transform="translate(30, 60)" font-size="13">
    <!-- Left bracket -->
    <text x="0" y="50" fill="#888" font-size="60">[</text>
    
    <!-- Matrix values -->
    <text x="25" y="30" fill="#5588aa">2</text>
    <text x="60" y="30" fill="#5588aa">0</text>
    <text x="95" y="30" fill="#5588aa">0</text>
    <text x="130" y="30" fill="#5588aa">10</text>

    <text x="25" y="60" fill="#5588aa">0</text>
    <text x="60" y="60" fill="#5588aa">2</text>
    <text x="95" y="60" fill="#5588aa">0</text>
    <text x="130" y="60" fill="#5588aa">-5</text>

    <text x="25" y="90" fill="#5588aa">0</text>
    <text x="60" y="90" fill="#5588aa">0</text>
    <text x="95" y="90" fill="#5588aa">1</text>
    <text x="130" y="90" fill="#5588aa">0</text>

    <text x="25" y="120" fill="#5588aa">0</text>
    <text x="60" y="120" fill="#5588aa">0</text>
    <text x="95" y="120" fill="#5588aa">0</text>
    <text x="130" y="120" fill="#5588aa">1</text>

    <!-- Right bracket -->
    <text x="155" y="50" fill="#888" font-size="60">]</text>

    <!-- Row highlight for first result -->
    <rect x="20" y="15" width="130" height="20" rx="2" fill="#5588aa" opacity="0.1"/>
  </g>

  <!-- Multiply sign -->
  <text x="210" y="120" fill="#888" font-size="24">×</text>

  <!-- Vector -->
  <g transform="translate(240, 60)" font-size="13">
    <text x="0" y="50" fill="#888" font-size="60">[</text>
    
    <text x="20" y="30" fill="#44aa66">3</text>
    <text x="20" y="60" fill="#44aa66">4</text>
    <text x="20" y="90" fill="#44aa66">1</text>
    <text x="20" y="120" fill="#44aa66">1</text>

    <text x="38" y="50" fill="#888" font-size="60">]</text>

    <!-- Labels -->
    <text x="60" y="30" fill="#666" font-size="9">x</text>
    <text x="60" y="60" fill="#666" font-size="9">y</text>
    <text x="60" y="90" fill="#666" font-size="9">z</text>
    <text x="60" y="120" fill="#666" font-size="9">w</text>
  </g>

  <!-- Equals -->
  <text x="330" y="120" fill="#888" font-size="24">=</text>

  <!-- Result vector -->
  <g transform="translate(350, 60)" font-size="13">
    <text x="0" y="50" fill="#888" font-size="60">[</text>
    
    <text x="20" y="30" fill="#ddaa44">16</text>
    <text x="20" y="60" fill="#ddaa44">3</text>
    <text x="20" y="90" fill="#ddaa44">1</text>
    <text x="20" y="120" fill="#ddaa44">1</text>

    <text x="38" y="50" fill="#888" font-size="60">]</text>

    <text x="60" y="30" fill="#666" font-size="9">x'</text>
    <text x="60" y="60" fill="#666" font-size="9">y'</text>
    <text x="60" y="90" fill="#666" font-size="9">z'</text>
    <text x="60" y="120" fill="#666" font-size="9">w'</text>
  </g>

  <!-- Computation detail -->
  <g transform="translate(480, 60)">
    <rect x="0" y="0" width="150" height="130" rx="4" fill="#1e1e30" stroke="#555" stroke-width="0.5"/>
    <text x="75" y="20" text-anchor="middle" fill="#ccc" font-size="10" font-weight="600">Как вычисляется:</text>
    
    <text x="10" y="40" fill="#888" font-size="9">x' = 2·3 + 0·4 + 0·1 + 10·1</text>
    <text x="10" y="52" fill="#ddaa44" font-size="9"> = 16</text>
    
    <text x="10" y="70" fill="#888" font-size="9">y' = 0·3 + 2·4 + 0·1 + (-5)·1</text>
    <text x="10" y="82" fill="#ddaa44" font-size="9"> = 3</text>
    
    <text x="10" y="100" fill="#888" font-size="9">z' = 0·3 + 0·4 + 1·1 + 0·1</text>
    <text x="10" y="112" fill="#ddaa44" font-size="9"> = 1</text>

    <text x="10" y="130" fill="#888" font-size="9">w' = 0·3 + 0·4 + 0·1 + 1·1 = 1</text>
  </g>

  <!-- Matrix interpretation -->
  <g transform="translate(30, 230)">
    <rect x="0" y="0" width="590" height="90" rx="4" fill="#1e1e30" stroke="#555" stroke-width="0.5"/>
    
    <text x="295" y="20" text-anchor="middle" fill="#ccc" font-size="11" font-weight="600">Что делает эта матрица</text>

    <text x="20" y="42" fill="#5588aa" font-size="10">[2 0 0 10]</text>
    <text x="100" y="42" fill="#888" font-size="10">масштабирование X × 2, сдвиг по X на +10</text>

    <text x="20" y="60" fill="#5588aa" font-size="10">[0 2 0 -5]</text>
    <text x="100" y="60" fill="#888" font-size="10">масштабирование Y × 2, сдвиг по Y на −5</text>

    <text x="20" y="78" fill="#5588aa" font-size="10">[0 0 1  0]</text>
    <text x="100" y="78" fill="#888" font-size="10">Z без изменений</text>

    <text x="350" y="78" fill="#888" font-size="10">w=1 → точка (а не направление)</text>
  </g>

  <text x="325" y="340" text-anchor="middle" fill="#888" font-size="10">Каждая строка матрицы — скалярное произведение с вектором-столбцом</text>
</svg>
