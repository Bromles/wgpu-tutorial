<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" style="font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;">
  <rect width="500" height="400" fill="#1a1a2e" rx="8"/>

  <!-- Title -->
  <text x="250" y="30" text-anchor="middle" fill="#ccc" font-size="14" font-weight="600">Три нормали в одной вершине куба</text>

  <!-- 3D cube corner -->
  <g transform="translate(200, 200)">
    <!-- Three visible faces from corner -->
    <!-- Right face (x+) -->
    <polygon points="0,0 120,50 120,140 0,90" fill="#2a3a4a" stroke="#5588aa" stroke-width="1.5" opacity="0.8"/>
    <!-- Top face (y+) -->
    <polygon points="0,0 0,90 -100,140 -100,50" fill="#2a4a3a" stroke="#44aa66" stroke-width="1.5" opacity="0.8"/>
    <!-- Front face (z+) -->
    <polygon points="0,0 120,50 20,100 -100,50" fill="#3a2a4a" stroke="#aa5588" stroke-width="1.5" opacity="0.6"/>

    <!-- Vertex dot -->
    <circle cx="0" cy="0" r="5" fill="#fff"/>

    <!-- Normal 1: right face (1,0,0) -->
    <line x1="60" y1="70" x2="160" y2="70" stroke="#5588aa" stroke-width="2.5"/>
    <polygon points="160,70 148,64 148,76" fill="#5588aa"/>
    <text x="165" y="75" fill="#5588aa" font-size="12" font-weight="600">(1, 0, 0)</text>
    <text x="50" y="65" fill="#5588aa" font-size="10">правая грань</text>

    <!-- Normal 2: top face (0,1,0) -->
    <line x1="-50" y1="70" x2="-50" y2="-30" stroke="#44aa66" stroke-width="2.5"/>
    <polygon points="-50,-30 -56,-18 -44,-18" fill="#44aa66"/>
    <text x="-45" y="-35" fill="#44aa66" font-size="12" font-weight="600">(0, 1, 0)</text>
    <text x="-120" y="85" fill="#44aa66" font-size="10">верхняя грань</text>

    <!-- Normal 3: front face (0,0,1) -->
    <line x1="10" y1="50" x2="10" y2="140" stroke="#aa5588" stroke-width="2.5"/>
    <polygon points="10,140 4,128 16,128" fill="#aa5588"/>
    <text x="20" y="150" fill="#aa5588" font-size="12" font-weight="600">(0, 0, 1)</text>
    <text x="-20" y="30" fill="#aa5588" font-size="10">передняя грань</text>

    <!-- Label for vertex -->
    <text x="8" y="-10" fill="#fff" font-size="11">вершина (0.5, 0.5, 0.5)</text>
  </g>

  <!-- Explanation -->
  <text x="250" y="375" text-anchor="middle" fill="#888" font-size="11">Одна и та же вершина нуждается в разных нормалях для каждой грани</text>
  <text x="250" y="392" text-anchor="middle" fill="#888" font-size="11">Поэтому кубу нужны 24 вершины: 4 на грань × 6 граней</text>
</svg>
